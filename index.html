<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExE Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060608;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Particles canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Perspective grid ── */
    .bg-grid {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 200%;
      height: 55vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 60px 60px;
      transform-origin: 50% 100%;
      transform: translateX(-50%) perspective(700px) rotateX(72deg);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 75%);
      mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(90px);
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(180,180,255,0.07) 0%, transparent 70%);
      animation: orbPulse 7s ease-in-out infinite;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      bottom: -100px;
      left: -80px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      animation: orbPulse 9s ease-in-out infinite reverse;
    }

    .orb-3 {
      width: 280px;
      height: 280px;
      bottom: -60px;
      right: -60px;
      background: radial-gradient(circle, rgba(100,120,255,0.05) 0%, transparent 70%);
      animation: orbPulse 11s ease-in-out infinite;
      animation-delay: -3s;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1) translateY(0); opacity: 1; }
      50%       { transform: scale(1.12) translateY(-20px); opacity: 0.7; }
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scanline noise ── */
    .noise {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Content ── */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 24px;
      width: 100%;
      max-width: 480px;
    }

    /* Logo */
    .logo-wrap {
      width: 115px;
      height: 115px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 32px rgba(0,0,0,0.6),
        0 0 60px rgba(255,255,255,0.04);
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .logo-fallback .exe {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .logo-fallback .community {
      font-size: 0.45rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.6);
    }

    /* Header */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    .header p {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.02em;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-btn .icon svg { width: 20px; height: 20px; }

    .link-btn.store     .icon { background: rgba(255,255,255,0.08); }
    .link-btn.store     .icon svg { fill: #fff; }
    .link-btn.discord   .icon { background: rgba(88,101,242,0.2); }
    .link-btn.discord   .icon svg { fill: #5865F2; }
    .link-btn.community .icon { background: rgba(88,101,242,0.12); }
    .link-btn.community .icon svg { fill: #7289da; }
    .link-btn.instagram .icon { background: rgba(225,48,108,0.14); }
    .link-btn.instagram .icon svg { fill: url(#insta-grad); }

    .label { flex: 1; }

    .label span {
      display: block;
      font-size: 0.74rem;
      color: rgba(255,255,255,0.32);
      font-weight: 400;
      margin-top: 2px;
    }

    .arrow {
      color: rgba(255,255,255,0.22);
      font-size: 1.1rem;
      transition: color 0.2s;
    }

    .link-btn:hover .arrow { color: rgba(255,255,255,0.55); }

    .footer {
      font-size: 0.74rem;
      color: rgba(255,255,255,0.14);
      letter-spacing: 0.05em;
    }

    svg.defs { position: absolute; width: 0; height: 0; }
  </style>
</head>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(randomY) {
        this.init(randomY);
      }
      init(randomY) {
        this.x    = Math.random() * W;
        this.y    = randomY ? Math.random() * H : H + 5;
        this.r    = Math.random() * 1.2 + 0.3;
        this.vy   = -(Math.random() * 0.35 + 0.12);
        this.vx   = (Math.random() - 0.5) * 0.15;
        this.life = 0;
        this.max  = Math.random() * 260 + 120;
        this.base = Math.random() * 0.35 + 0.05;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;
        if (this.life > this.max || this.y < -5) this.init(false);
      }
      draw() {
        const t = this.life / this.max;
        const a = this.base * (1 - t);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      }
    }

    function boot() {
      resize();
      window.addEventListener('resize', resize);
      for (let i = 0; i < 70; i++) particles.push(new Particle(true));
      loop();
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    boot();
  </script>
