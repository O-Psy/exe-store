<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.ExE</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060608;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background ── */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .bg-grid {
      position: fixed;
      left: 50%; bottom: 0;
      width: 200%; height: 55vh;
      background-image:
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 60px 60px;
      transform-origin: 50% 100%;
      transform: translateX(-50%) perspective(700px) rotateX(72deg);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 75%);
      mask-image: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 75%);
      pointer-events: none; z-index: 0;
    }

    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(90px); }
    .orb-1 {
      width: 500px; height: 500px; top: -180px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(180,180,255,0.07) 0%, transparent 70%);
      animation: orbPulse 7s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px; bottom: -100px; left: -80px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      animation: orbPulse 9s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 280px; height: 280px; bottom: -60px; right: -60px;
      background: radial-gradient(circle, rgba(100,120,255,0.05) 0%, transparent 70%);
      animation: orbPulse 11s ease-in-out infinite; animation-delay: -3s;
    }
    @keyframes orbPulse {
      0%,100% { transform: scale(1) translateY(0); opacity: 1; }
      50%      { transform: scale(1.12) translateY(-20px); opacity: 0.7; }
    }
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 0;
    }
    .noise {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px; opacity: 0.025; pointer-events: none; z-index: 1;
    }

    /* ── Container ── */
    .container {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 40px 24px;
      width: 100%; max-width: 400px;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.04), 0 0 40px rgba(255,255,255,0.06);
      overflow: hidden;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-fallback { font-size: 1.4rem; font-weight: 700; }

    /* ── Identity ── */
    .identity { text-align: center; display: flex; flex-direction: column; gap: 6px; }
    .identity h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.04em; }

    /* ── Glitch ── */
    .glitch {
      position: relative;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #0ff;
      animation: glitch1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .glitch::after {
      color: #f0f;
      animation: glitch2 3s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }
    @keyframes glitch1 {
      0%,90%,100% { transform: translate(0); opacity: 0; }
      91%          { transform: translate(-2px, 1px); opacity: 0.8; }
      93%          { transform: translate(2px, -1px); opacity: 0.8; }
      95%          { transform: translate(-1px, 0); opacity: 0.8; }
      97%          { transform: translate(0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%,90%,100% { transform: translate(0); opacity: 0; }
      92%          { transform: translate(2px, 1px); opacity: 0.8; }
      94%          { transform: translate(-2px, -1px); opacity: 0.8; }
      96%          { transform: translate(1px, 0); opacity: 0.8; }
      98%          { transform: translate(0); opacity: 0; }
    }
    .meta {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }
    .meta .dot { opacity: 0.3; }
    .location { display: flex; align-items: center; gap: 4px; }

    /* ── Discord Presence ── */
    .presence-card {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      min-height: 80px;
      position: relative;
    }
    .presence-avatar-wrap { position: relative; flex-shrink: 0; }
    .presence-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.08);
      display: block;
    }
    .presence-avatar-placeholder {
      width: 68px; height: 68px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .status-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 17px; height: 17px; border-radius: 50%;
      border: 2px solid #060608;
      background: #747F8D;
    }
    .status-dot.online  { background: #57F287; }
    .status-dot.idle    { background: #FEE75C; }
    .status-dot.dnd     { background: #ED4245; }
    .status-dot.offline { background: #747F8D; }

    .presence-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .presence-top-row {
      display: flex; align-items: center; gap: 6px;
    }
    .presence-name {
      font-size: 1.05rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .presence-badges {
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .presence-badge {
      width: 20px; height: 20px;
      object-fit: contain;
      filter: drop-shadow(0 0 3px rgba(255,255,255,0.2));
    }
    .presence-custom-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 2px 8px 2px 5px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
      color: #fff;
      flex-shrink: 0;
    }
    .presence-custom-tag img { width: 14px; height: 14px; object-fit: contain; }

    .presence-activity-label {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
    }
    .presence-activity {
      font-size: 0.92rem; font-weight: 600;
      color: rgba(255,255,255,0.88);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .presence-sub {
      font-size: 0.75rem; color: rgba(255,255,255,0.35);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .presence-art-wrap {
      flex-shrink: 0; align-self: center;
    }
    .presence-art-img {
      width: 58px; height: 58px; border-radius: 10px;
      object-fit: cover; display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .presence-platform {
      position: absolute; top: 14px; right: 16px;
      display: flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.06);
      padding: 3px 8px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ── Icon Links ── */
    .icon-row {
      display: flex; gap: 12px; align-items: center; justify-content: center;
      flex-wrap: wrap;
    }
    .icon-link {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; color: #fff;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .icon-link:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-3px);
    }
    .icon-link svg { width: 22px; height: 22px; }
    .icon-link .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.7rem; font-weight: 600;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .icon-link { position: relative; }
    .icon-link:hover .tooltip { opacity: 1; }


    /* ── Views ── */
    .views {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: rgba(255,255,255,0.25);
      font-weight: 500; letter-spacing: 0.03em;
    }
    .views svg { width: 14px; height: 14px; opacity: 0.5; }

    svg.defs { position: absolute; width: 0; height: 0; }
  </style>
</head>

  <script>
    // ── Tab title typewriter ──
    (function() {
      const phrase = '.ExE';
      let ci = 0, deleting = false;
      function tick() {
        document.title = phrase.slice(0, ci);
        if (!deleting && ci >= phrase.length) { deleting = true; setTimeout(tick, 4000); return; }
        if (deleting && ci <= 0)              { deleting = false; setTimeout(tick, 2000); return; }
        deleting ? ci-- : ci++;
        setTimeout(tick, deleting ? 350 : 420);
      }
      tick();
    })();

    // ── Particles ──
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(randomY) { this.init(randomY); }
      init(randomY) {
        this.x = Math.random() * W;
        this.y = randomY ? Math.random() * H : H + 5;
        this.r = Math.random() * 1.2 + 0.3;
        this.vy = -(Math.random() * 0.35 + 0.12);
        this.vx = (Math.random() - 0.5) * 0.15;
        this.life = 0;
        this.max = Math.random() * 260 + 120;
        this.base = Math.random() * 0.35 + 0.05;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.life++;
        if (this.life > this.max || this.y < -5) this.init(false);
      }
      draw() {
        const a = this.base * (1 - this.life / this.max);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      }
    }

    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 70; i++) particles.push(new Particle(true));
    (function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    })();

    // ── Discord Presence (Lanyard) ──
    const DISCORD_ID = '365604397587103747';
    const STATUS_MAP = { online: 'Online', idle: 'Ausente', dnd: 'Não perturbe', offline: 'Offline' };
    const BADGE_MAP = [
      { flag: 1,       url: 'https://cdn.discordapp.com/badge-icons/5e74e9b61934fc1f67c65515d1f7e60d.png', label: 'Discord Staff' },
      { flag: 2,       url: 'https://cdn.discordapp.com/badge-icons/3f9748e53446a137a052f3454e2de41e.png', label: 'Partner' },
      { flag: 4,       url: 'https://cdn.discordapp.com/badge-icons/bf01d1073931f921909045f3a39fd264.png', label: 'HypeSquad Events' },
      { flag: 8,       url: 'https://cdn.discordapp.com/badge-icons/2717692c7dca7289b35297368a940dd0.png', label: 'Bug Hunter' },
      { flag: 64,      url: 'https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png', label: 'HypeSquad Bravery' },
      { flag: 128,     url: 'https://cdn.discordapp.com/badge-icons/011940fd013082d85d96680aeed53e2f.png', label: 'HypeSquad Brilliance' },
      { flag: 256,     url: 'https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png', label: 'HypeSquad Balance' },
      { flag: 512,     url: 'https://cdn.discordapp.com/badge-icons/7060786766c9c840eb3019e725d2b358.png', label: 'Early Supporter' },
      { flag: 16384,   url: 'https://cdn.discordapp.com/badge-icons/848f79194d4be5ff5f81505cbd0ce1e6.png', label: 'Bug Hunter Lv2' },
      { flag: 131072,  url: 'https://cdn.discordapp.com/badge-icons/6df5892e0f35b051f8b61eace34f4967.png', label: 'Verified Bot Dev' },
      { flag: 262144,  url: 'https://cdn.discordapp.com/badge-icons/53244c8ac4b33b34873baff800d7b5e5.png', label: 'Moderador Certificado' },
      { flag: 4194304, url: 'https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png', label: 'Active Developer' },
    ];

    // Badges fixas (Lanyard não as retorna todas)
    const MANUAL_BADGES = [
      { url: 'https://cdn.discordapp.com/badge-icons/2ba85e8026a8614b640c2837bcdfe21b.png', label: 'Nitro' },
      { url: 'https://cdn.discordapp.com/badge-icons/011940fd013082d85d96680aeed53e2f.png', label: 'HypeSquad Brilliance' },
      { url: 'https://cdn.discordapp.com/badge-icons/51040c70d4f20a921ad6674ff86fc95c.png', label: 'Server Booster' },
      { url: 'https://cdn.discordapp.com/badge-icons/fd272aa0f7bce43bb0e2d5c8d1d9dab7.png', label: 'Completou Missão' },
      { url: 'https://cdn.discordapp.com/badge-icons/e4b45f4ebab48bdb71ea6cd08e898ed7.png', label: 'Aprendiz' },
    ];

    let presenceLoaded = false;

    async function fetchPresence() {
      try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!json.data) throw new Error('no data');
        const data = json.data;
        const user = data.discord_user;

        document.getElementById('statusDot').className = `status-dot ${data.discord_status}`;
        document.getElementById('presenceName').textContent = user.global_name || user.username || '0.psy.exe';


        // Avatar
        if (user.avatar && !presenceLoaded) {
          presenceLoaded = true;
          const wrap = document.getElementById('presenceAvatarWrap');
          const img = document.createElement('img');
          img.className = 'presence-avatar';
          img.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`;
          img.alt = user.username;
          wrap.replaceWith(img);
          img.id = 'presenceAvatarWrap';
        }

        // Badges
        const badgesEl = document.getElementById('presenceBadges');
        badgesEl.innerHTML = '';
        const flags = user.public_flags || 0;

        const addBadge = (url, label) => {
          const img = document.createElement('img');
          img.className = 'presence-badge';
          img.src = url; img.title = label; img.alt = label;
          img.onerror = () => { img.style.display = 'none'; };
          badgesEl.appendChild(img);
        };

        // Badges manuais (Nitro, Booster, etc.)
        MANUAL_BADGES.forEach(b => addBadge(b.url, b.label));

        // Badges do public_flags (ignora flag 128 — Brilliance já está em MANUAL_BADGES)
        BADGE_MAP.forEach(b => { if ((flags & b.flag) && b.flag !== 128) addBadge(b.url, b.label); });

        // Activity
        const actEl    = document.getElementById('presenceActivity');
        const labelEl  = document.getElementById('presenceLabel');
        const subEl    = document.getElementById('presenceSub');
        const artWrap  = document.getElementById('presenceArt');
        const artImg   = document.getElementById('presenceArtImg');
        const platform = document.getElementById('presencePlatform');

        const spotify = data.spotify;
        if (spotify) {
          labelEl.textContent = 'Listening to';
          labelEl.style.display = '';
          actEl.textContent = spotify.song;
          subEl.textContent = `by ${spotify.artist}`;
          subEl.style.display = '';
          artImg.src = spotify.album_art_url;
          artWrap.style.display = '';
          platform.style.display = 'none';
        } else {
          labelEl.style.display = 'none';
          subEl.style.display = 'none';
          artWrap.style.display = 'none';
          platform.style.display = '';
          const act = data.activities?.find(a => a.type === 0 || a.type === 2);
          if (act?.type === 2) {
            actEl.textContent = `ouvindo ${act.details || act.name}`;
          } else if (act?.type === 0) {
            actEl.textContent = `jogando ${act.name}`;
          } else {
            actEl.textContent = STATUS_MAP[data.discord_status] || 'Offline';
          }
        }
      } catch {
        document.getElementById('presenceName').textContent = '0.psy.exe';
        document.getElementById('presenceActivity').textContent = 'ExE Store';
      }
    }

    fetchPresence();
    setInterval(fetchPresence, 30000);


    // ── View Counter ──
    (async function() {
      const countEl    = document.getElementById('viewCount');
      const SESSION_KEY = 'exe_counted';
      const BASE        = 'https://counterapi.dev/api/exe-store-site/visits';
      try {
        const alreadyCounted = sessionStorage.getItem(SESSION_KEY);
        const url = alreadyCounted ? BASE : `${BASE}/up`;
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const { count } = await res.json();
        countEl.textContent = typeof count === 'number' ? count.toLocaleString('pt-BR') : '—';
        if (!alreadyCounted) sessionStorage.setItem(SESSION_KEY, '1');
      } catch {
        countEl.textContent = '—';
      }
    })();
  </script>
